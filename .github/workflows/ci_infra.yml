name: CI for Infrastructure

on:
  pull_request:
    branches:
      - main
    paths:
      - 'iac-workspace/**'
      - '.github/workflows/ci_infra.yml'
  push:
    branches:
      - main
    paths:
      - 'iac-workspace/**'
      - '.github/workflows/ci_infra.yml'

jobs:
  ansible-ci:
    name: Ansible Lint & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac-workspace/ansible
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint

      - name: Install Ansible Collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Ansible Syntax Check
        # インベントリがないと構文チェックが通らないモジュールがあるためダミーインベントリを使用（実接続はしない）
        run: ansible-playbook -i inventory.ini site.yml --syntax-check

      - name: Run Ansible Lint
        # .ansible-lint の設定を読み込ませるため上の階層から実行
        working-directory: iac-workspace
        run: ansible-lint ansible/site.yml

  local-integration-tests:
    name: Local Integration Tests (Docker)
    # 使い捨てコンテナ/モックでロール・監視・フェイルオーバーを検証（本番非接続）。
    # ubuntu-latest は docker / docker compose 利用可。
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run local test suite
        working-directory: iac-workspace/tests
        run: ./run.sh

  terraform-ci:
    name: Terraform Format & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac-workspace/terraform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        # S3バックエンド等に接続せずに初期化
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  terraform-plan:
    name: Terraform Plan (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    defaults:
      run:
        working-directory: iac-workspace/terraform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write backend config
        run: echo "${{ secrets.TF_BACKEND_CONFIG }}" > ci_backend.hcl

      - name: Terraform Init
        run: terraform init -backend-config=ci_backend.hcl
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            const status = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '⚠️';
            const body = `### ${status} Terraform Plan\n\`\`\`hcl\n${plan || '(出力なし — シークレット未設定またはエラー)'}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Cleanup backend config
        if: always()
        run: rm -f ci_backend.hcl

  trivy-scan:
    name: Container & IaC Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy (IaC config scan)
        # aquasecurity/trivy-action v0.36.0 を使用。
        # 2026年3月のタグ改ざん事案に伴い、コミットSHAで固定。
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: config
          scan-ref: iac-workspace/ansible/files/
          severity: HIGH,CRITICAL
          exit-code: '1'
