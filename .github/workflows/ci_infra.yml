name: インフラCI（コード検証）

on:
  pull_request:
    branches:
      - main
    paths:
      - 'iac-workspace/**'
      - '.github/workflows/ci_infra.yml'
  push:
    branches:
      - main
    paths:
      - 'iac-workspace/**'
      - '.github/workflows/ci_infra.yml'

jobs:
  ansible-ci:
    name: Ansible 静的解析・構文チェック
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac-workspace/ansible
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ansible と依存ツールのインストール
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint

      - name: Ansible コレクションのインストール
        run: ansible-galaxy collection install -r requirements.yml

      - name: Ansible 構文チェック
        # インベントリがないと構文チェックが通らないモジュールがあるためダミーインベントリを使用（実接続はしない）
        run: ansible-playbook -i inventory.ini site.yml --syntax-check

      - name: Ansible Lint（静的解析）
        # .ansible-lint の設定を読み込ませるため上の階層から実行
        working-directory: iac-workspace
        # molecule の converge.yml が role を解決できるようロールパスを付与
        env:
          ANSIBLE_ROLES_PATH: ansible/roles
        run: ansible-lint ansible/site.yml

  local-integration-tests:
    name: ローカル統合テスト（Docker）
    # 使い捨てコンテナ/モックでロール・監視・フェイルオーバーを検証（本番非接続）。
    # ubuntu-latest は docker / docker compose 利用可。
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ローカルテスト一式の実行
        working-directory: iac-workspace/tests
        run: ./run.sh

  terraform-ci:
    name: Terraform 整形・検証
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac-workspace/terraform
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Terraform のセットアップ
        uses: hashicorp/setup-terraform@v3

      - name: Terraform 整形チェック
        run: terraform fmt -check

      - name: Terraform 初期化
        # S3バックエンド等に接続せずに初期化
        run: terraform init -backend=false

      - name: Terraform 検証
        run: terraform validate

  terraform-plan:
    name: Terraform Plan（PRのみ）
    runs-on: ubuntu-latest
    # Dependabot の PR には GitHub がシークレットを渡さない仕様のため、
    # R2バックエンド認証が必須のこのジョブはスキップする（誤検知の失敗を防ぐ）。
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    permissions:
      pull-requests: write
    defaults:
      run:
        working-directory: iac-workspace/terraform
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Terraform のセットアップ
        uses: hashicorp/setup-terraform@v3

      - name: バックエンド設定の書き出し
        run: echo "${{ secrets.TF_BACKEND_CONFIG }}" > ci_backend.hcl

      - name: Terraform 初期化
        run: terraform init -backend-config=ci_backend.hcl
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Terraform Plan 実行
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Plan 結果を PR にコメント
        uses: actions/github-script@v9
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            const status = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '⚠️';
            const body = `### ${status} Terraform Plan\n\`\`\`hcl\n${plan || '(出力なし — シークレット未設定またはエラー)'}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: バックエンド設定の後始末
        if: always()
        run: rm -f ci_backend.hcl

  trivy-scan:
    name: コンテナ・IaC 脆弱性スキャン
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Trivy 実行（IaC設定スキャン）
        # aquasecurity/trivy-action v0.36.0 を使用。
        # 2026年3月のタグ改ざん事案に伴い、コミットSHAで固定。
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: config
          scan-ref: iac-workspace/ansible/files/
          severity: HIGH,CRITICAL
          exit-code: '1'

  notify-failure:
    name: Discord 通知（失敗時）
    # いずれかのジョブが失敗したら Discord に通知する。
    needs: [ansible-ci, local-integration-tests, terraform-ci, terraform-plan, trivy-scan]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: CI 失敗を Discord へ通知
        run: |
          if [ -z "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping."; exit 0
          fi
          curl -s -H "Content-Type: application/json" -X POST \
            -d '{"content": "[CI FAILED] インフラCIが失敗しました\nワークフロー: `${{ github.workflow }}`\nブランチ: `${{ github.ref_name }}`\nコミット: `${{ github.sha }}`\nトリガー: `${{ github.event_name }}`\n詳細: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
