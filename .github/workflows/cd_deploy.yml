name: アプリからの自動デプロイ

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'デプロイ対象のアプリ'
        required: true
        type: choice
        options:
          - ubsleepy
          - shakeweb
          - pkhack
          - ayahuya
      dry_run:
        description: 'ドライラン（シミュレーションのみ）'
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types:
      - deploy_ubsleepy
      - deploy_shakeweb
      - deploy_pkhack
      - deploy_ayahuya

jobs:
  deploy:
    name: デプロイ実行
    runs-on: self-hosted
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
      ANSIBLE_PRIVATE_KEY_FILE: "${{ github.workspace }}/.ansible_pkey"
      ANSIBLE_VAULT_PASS_FILE: "${{ github.workspace }}/.ansible_vault_pass"
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v6

      - name: Ansible 認証情報のセットアップ
        env:
          ANSIBLE_SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_VAULT_PASS: ${{ secrets.ANSIBLE_VAULT_PASS }}
          ANSIBLE_VARS: ${{ secrets.ANSIBLE_VARS }}
        run: |
          echo "$ANSIBLE_SSH_KEY" > "${{ env.ANSIBLE_PRIVATE_KEY_FILE }}"
          chmod 600 "${{ env.ANSIBLE_PRIVATE_KEY_FILE }}"
          echo "$ANSIBLE_VAULT_PASS" > "${{ env.ANSIBLE_VAULT_PASS_FILE }}"
          chmod 600 "${{ env.ANSIBLE_VAULT_PASS_FILE }}"
          mkdir -p iac-workspace/local_config/ansible/credentials
          echo "$ANSIBLE_VARS" > iac-workspace/local_config/ansible/vars.yml
          cp iac-workspace/local_config/ansible/credentials/vault.yml.enc iac-workspace/local_config/ansible/credentials/vault.yml
          cp iac-workspace/local_config/ansible/credentials/key.pem.enc iac-workspace/local_config/ansible/credentials/key.pem
          cat << 'EOF' > iac-workspace/local_config/ansible/inventory.ini
          [proxy_node]
          negitoroserver ansible_host=100.92.253.28 ansible_user=ansible_admin

          [home_node1]
          shakeserver ansible_host=100.116.167.59 ansible_user=ansible_admin

          [home_node2]
          tarakoserver ansible_host=100.123.163.119 ansible_user=ansible_admin
          EOF

      - name: Ansible コレクションのインストール
        run: |
          cd iac-workspace/ansible
          ansible-galaxy collection install -r requirements.yml --force

      - name: ubsleepy のデプロイ
        if: github.event.action == 'deploy_ubsleepy' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'ubsleepy')
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS="--check"
          fi
          cd iac-workspace
          ansible-playbook -i local_config/ansible/inventory.ini ansible/site.yml --tags ubsleepy \
            -e @local_config/ansible/vars.yml \
            -e @local_config/ansible/credentials/vault.yml \
            --private-key="${{ env.ANSIBLE_PRIVATE_KEY_FILE }}" \
            --vault-password-file="${{ env.ANSIBLE_VAULT_PASS_FILE }}" $EXTRA_ARGS

      - name: shake-web のデプロイ
        if: github.event.action == 'deploy_shakeweb' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'shakeweb')
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS="--check"
          fi
          cd iac-workspace
          ansible-playbook -i local_config/ansible/inventory.ini ansible/site.yml --tags web \
            -e @local_config/ansible/vars.yml \
            -e @local_config/ansible/credentials/vault.yml \
            --private-key="${{ env.ANSIBLE_PRIVATE_KEY_FILE }}" \
            --vault-password-file="${{ env.ANSIBLE_VAULT_PASS_FILE }}" $EXTRA_ARGS

      # デプロイ"成功"＝アプリが実際に動く、ではない。実ユーザー経路で
      # DB連携エンドポイントを叩き、200でなければデプロイを失敗扱いにする
      # （Cloudflare→proxy→nginx→quiz→PostgreSQL まで含めた疎通検証）。
      - name: スモークテスト（shake-web / DB連携エンドポイント）
        if: github.event.action == 'deploy_shakeweb' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'shakeweb')
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "dry-run のためスモークテストをスキップ"; exit 0
          fi
          set -euo pipefail
          BASE="https://ruruthegeek.dpdns.org"
          echo "Smoke test against $BASE ..."
          ok=0
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/quiz/api/bsquiz/pokedex" || echo 000)
            echo "  attempt $i: /quiz/api/bsquiz/pokedex -> $code"
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 5
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Smoke test FAILED: DB連携エンドポイントが200を返しません（DB認証ズレ等を疑う）"
            exit 1
          fi
          curl -fsS -o /dev/null "$BASE/" && echo "root page OK"
          echo "Smoke test PASSED"

      - name: pkhack のデプロイ
        if: github.event.action == 'deploy_pkhack' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pkhack')
      - name: ayahuya のデプロイ
        if: github.event.action == 'deploy_ayahuya' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'ayahuya')
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS="--check"
          fi
          cd iac-workspace
          ansible-playbook -i local_config/ansible/inventory.ini ansible/site.yml --tags web \
            -e @local_config/ansible/vars.yml \
            -e @local_config/ansible/credentials/vault.yml \
            --private-key="${{ env.ANSIBLE_PRIVATE_KEY_FILE }}" \
            --vault-password-file="${{ env.ANSIBLE_VAULT_PASS_FILE }}" $EXTRA_ARGS

      # pkhack も DB連携エンドポイント（/quiz/api/bsquiz/pokedex）で疎通を確認する。
      # DNS未適用・pkhack DB未作成・ssl設定不足時はここで落ちる。
      - name: スモークテスト（pkhack / DB連携エンドポイント）
        if: github.event.action == 'deploy_pkhack' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pkhack')
      # ayahuya は純静的だが、Cloudflare→proxy→nginx→静的配信 までの疎通を
      # 大辞典トップ(/docs/words/)で検証する。DNS未適用・証明書未カバー時はここで落ちる。
      - name: スモークテスト（ayahuya / 大辞典トップ）
        if: github.event.action == 'deploy_ayahuya' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'ayahuya')
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "dry-run のためスモークテストをスキップ"; exit 0
          fi
          set -euo pipefail
          BASE="https://pkhack.ruruthegeek.dpdns.org"
          echo "Smoke test against $BASE ..."
          ok=0
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/quiz/api/bsquiz/pokedex" || echo 000)
            echo "  attempt $i: /quiz/api/bsquiz/pokedex -> $code"
          BASE="https://ayahuya.ruruthegeek.dpdns.org"
          echo "Smoke test against $BASE ..."
          ok=0
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/docs/words/" || echo 000)
            echo "  attempt $i: /docs/words/ -> $code"
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 5
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Smoke test FAILED: pkhack のDB連携エンドポイントが200を返しません"
            exit 1
          fi
          curl -fsS -o /dev/null "$BASE/quiz/" && echo "quiz hub OK"
            echo "::error::Smoke test FAILED: ayahuya 大辞典トップが200を返しません（DNS/証明書/配信を疑う）"
            exit 1
          fi
          curl -fsS -o /dev/null "$BASE/" && echo "root redirect page OK"
          echo "Smoke test PASSED"

      - name: 認証情報のクリーンアップ
        if: always()
        run: |
          rm -f "${{ env.ANSIBLE_PRIVATE_KEY_FILE }}"
          rm -f "${{ env.ANSIBLE_VAULT_PASS_FILE }}"

      - name: Discord 通知（成功時）
        if: success()
        run: |
          TARGET="${{ github.event.action }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="manual-${{ github.event.inputs.target }}"
          fi
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d '{"content": "[SUCCESS] デプロイ成功\n対象: `'"$TARGET"'`\nRunner: `tarakoserver`\n詳細: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
                 "${{ secrets.DISCORD_WEBHOOK_URL }}"
          else
            echo "DISCORD_WEBHOOK_URL is not set. Skipping notification."
          fi

      - name: Discord 通知（失敗時）
        if: failure()
        run: |
          TARGET="${{ github.event.action }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="manual-${{ github.event.inputs.target }}"
          fi
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d '{"content": "[FAILED] デプロイ失敗\n対象: `'"$TARGET"'`\nRunner: `tarakoserver`\nログを確認してください: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
                 "${{ secrets.DISCORD_WEBHOOK_URL }}"
          else
            echo "DISCORD_WEBHOOK_URL is not set. Skipping notification."
          fi
