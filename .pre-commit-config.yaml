repos:
  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
        files: iac-workspace/ansible/
        language_version: python3.13
        # molecule の converge.yml が role 'exporters' を解決できるようロールパスを付与
        entry: env LC_ALL=C.UTF-8 ANSIBLE_ROLES_PATH=iac-workspace/ansible/roles ansible-lint

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^docs/
