[defaults]
# Pythonインタプリタの自動検出（警告抑制）
interpreter_python = auto_silent

# 並列実行数（ホスト数3台に対して余裕を持たせた設定）
forks = 10

# ファクト収集の最適化：
#   smart = 同一プレイブック実行内で同じホストへの2回目以降の収集をスキップ
gathering = smart
# ファクトキャッシュ：前回実行のファクトを再利用し、再実行時の収集コストを削減
fact_caching = jsonfile
fact_caching_connection = ~/.ansible/fact_cache
fact_caching_timeout = 86400

[ssh_connection]
# SSHパイプライン：タスクごとにSSH接続を確立し直すコストを削減（最大の効果）
# ※ requiretty が sudoers で設定されている場合は無効化が必要
pipelining = True
# SSH接続の多重化：既存の接続セッションを60秒再利用し、接続確立コストを削減
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ControlPath=/tmp/ansible-ssh-%r@%h-%p
