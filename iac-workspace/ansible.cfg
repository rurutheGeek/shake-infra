[defaults]
# Pythonインタプリタの自動検出（警告抑制）
interpreter_python = auto_silent

# 並列実行数（ホスト数3台に対して余裕を持たせた設定）
forks = 10

# ファクト収集の最適化：
# 小規模環境におけるキャッシュ不整合トラブルを回避するため、キャッシュを使用せず毎回収集する
gathering = implicit

# 接続タイムアウトをデフォルトの10秒から30秒に延長
timeout = 30

[ssh_connection]
# SSHパイプライン：タスクごとにSSH接続を確立し直すコストを削減（最大の効果）
# ※ requiretty が sudoers で設定されている場合は無効化が必要
pipelining = True
# SSH接続の多重化および接続タイムアウト設定の追加
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ControlPath=/tmp/ansible-ssh-%r@%h-%p -o ConnectTimeout=30 -o ConnectionAttempts=3
