        (web_ayahuya_remote_sha.stdout | default('') | trim) | length == 0 or
        (web_ayahuya_remote_sha.stdout | default('') | trim).split('\t')[0] != (web_ayahuya_local_sha.stdout | default('') | trim)
      }}

- name: "Git同期 [{{ web_ayahuya_repo_url | basename | replace('.git', '') }}:{{ web_ayahuya_git_branch | default('main') }}] → {{ app_dir }}/ayahuya_tmp"
  ansible.builtin.git:
