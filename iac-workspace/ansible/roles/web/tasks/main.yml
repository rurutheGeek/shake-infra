---
# web/tasks/main.yml
- name: Www-dataユーザーをdockerグループに追加
  ansible.builtin.user:
    name: "{{ app_owner }}"
    groups: docker
    append: true

- name: ベースディレクトリの作成
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: ログディレクトリの作成
  ansible.builtin.file:
    path: "{{ app_dir }}/log"
    state: directory
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: SSHディレクトリの作成 (www-data用)
  ansible.builtin.file:
    path: "/var/www/.ssh"
    state: directory
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0700"

- name: 既存のデプロイキーの存在確認
  ansible.builtin.stat:
    path: "/var/www/.ssh/id_ed25519_deploy"
  register: web_deploy_key_stat

- name: デプロイ用SSHキーペアの生成
  community.crypto.openssh_keypair:
    path: "/var/www/.ssh/id_ed25519_deploy"
    type: ed25519
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
  when: not web_deploy_key_stat.stat.exists

- name: 生成（または既存）の公開鍵の取得
  ansible.builtin.slurp:
    src: "/var/www/.ssh/id_ed25519_deploy.pub"
  register: web_deploy_pub_key

- name: GitHubへの接続確認（疎通確認）
  ansible.builtin.command: "ssh -T -o StrictHostKeyChecking=no -i /var/www/.ssh/id_ed25519_deploy git@github.com"
  register: web_github_ssh_check
  failed_when: false
  changed_when: false
  become: true
  become_user: "{{ app_owner }}"

- name: GitHubへのデプロイキー登録確認（未登録時はエラーで公開鍵を表示）
  ansible.builtin.fail:
    msg: |
      ==================================================================
      GitHubへの接続に失敗しました。
      以下の公開鍵をGitHubの「Deploy keys」に登録してから再実行してください。

      {{ web_deploy_pub_key['content'] | b64decode }}
      ==================================================================
  when: "'successfully authenticated' not in web_github_ssh_check.stderr"

# --- pkhack / ayahuya 用のリポジトリ別 Deploy Key ---
# GitHub は同一 SSH 鍵を複数リポジトリの Deploy Key として使い回せないため
# （"key already in use"）、private な pkhack / ayahuya にはそれぞれ専用鍵を生成・登録する。
- name: pkhack 用 Deploy Key の生成
  community.crypto.openssh_keypair:
    path: "/var/www/.ssh/id_ed25519_pkhack"
    type: ed25519
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"

# 両鍵を先に生成しておく（pkhack の登録確認で停止しても ayahuya 鍵は生成済みにし、
# 1回のデプロイで両方の公開鍵を取得できるようにする）。
- name: ayahuya 用 Deploy Key の生成
  community.crypto.openssh_keypair:
    path: "/var/www/.ssh/id_ed25519_ayahuya"
    type: ed25519
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"

- name: pkhack 用公開鍵の取得
  ansible.builtin.slurp:
    src: "/var/www/.ssh/id_ed25519_pkhack.pub"
  register: web_pkhack_pub_key

- name: pkhack への接続確認
  ansible.builtin.command: "ssh -T -o StrictHostKeyChecking=no -i /var/www/.ssh/id_ed25519_pkhack git@github.com"
  register: web_pkhack_ssh_check
  failed_when: false
  changed_when: false
  become: true
  become_user: "{{ app_owner }}"

- name: pkhack の Deploy Key 未登録チェック（未登録なら公開鍵を表示して停止）
  ansible.builtin.fail:
    msg: |
      ==================================================================
      pkhack リポジトリに Deploy Key が未登録です。以下の公開鍵を
      https://github.com/rurutheGeek/pkhack/settings/keys に（書き込み不要で）登録し、
      再実行してください。

      {{ web_pkhack_pub_key['content'] | b64decode }}
      ==================================================================
  when: "'successfully authenticated' not in web_pkhack_ssh_check.stderr"

- name: ayahuya 用公開鍵の取得
  ansible.builtin.slurp:
    src: "/var/www/.ssh/id_ed25519_ayahuya.pub"
  register: web_ayahuya_pub_key

- name: ayahuya への接続確認
  ansible.builtin.command: "ssh -T -o StrictHostKeyChecking=no -i /var/www/.ssh/id_ed25519_ayahuya git@github.com"
  register: web_ayahuya_ssh_check
  failed_when: false
  changed_when: false
  become: true
  become_user: "{{ app_owner }}"

- name: ayahuya の Deploy Key 未登録チェック（未登録なら公開鍵を表示して停止）
  ansible.builtin.fail:
    msg: |
      ==================================================================
      ayahuya リポジトリに Deploy Key が未登録です。以下の公開鍵を
      https://github.com/rurutheGeek/ayahuya/settings/keys に（書き込み不要で）登録し、
      再実行してください。

      {{ web_ayahuya_pub_key['content'] | b64decode }}
      ==================================================================
  when: "'successfully authenticated' not in web_ayahuya_ssh_check.stderr"

# --- Webアプリ: コミットSHAを比較してpullが必要か判断 ---
- name: "SHA確認 [{{ web_repo_url | basename | replace('.git', '') }}] ローカル"
  ansible.builtin.command:
    cmd: git rev-parse HEAD
    chdir: "{{ app_dir }}/src_tmp"
  register: web_local_sha
  changed_when: false
  failed_when: false   # 初回はsrc_tmpが存在しないためrc != 0になる
  become: true
  become_user: "{{ app_owner }}"

- name: "SHA確認 [{{ web_repo_url | basename | replace('.git', '') }}] リモート ({{ web_git_branch | default('main') }})"
  ansible.builtin.command:
    cmd: git ls-remote --heads {{ web_repo_url }} {{ web_git_branch | default('main') }}
  register: web_remote_sha
  changed_when: false
  environment:
    GIT_SSH_COMMAND: "ssh -i /var/www/.ssh/id_ed25519_deploy -o StrictHostKeyChecking=no"
  become: true
  become_user: "{{ app_owner }}"

- name: "更新判定 [{{ web_repo_url | basename | replace('.git', '') }}]"
  ansible.builtin.set_fact:
    web_code_updated: >-
      {{
        web_force_rebuild | default(false) | bool or
        web_local_sha.rc != 0 or
        (web_remote_sha.stdout | trim) | length == 0 or
        (web_remote_sha.stdout | trim).split('\t')[0] != (web_local_sha.stdout | trim)
      }}

- name: "Git同期 [{{ web_repo_url | basename | replace('.git', '') }}:{{ web_git_branch | default('main') }}] → {{ app_dir }}/src_tmp"
  ansible.builtin.git:
    repo: "{{ web_repo_url }}"
    dest: "{{ app_dir }}/src_tmp"
    update: true
    key_file: "/var/www/.ssh/id_ed25519_deploy"
    accept_hostkey: true
    version: "{{ web_git_branch | default('main') }}"
  become: true
  become_user: "{{ app_owner }}"
  when: web_code_updated

