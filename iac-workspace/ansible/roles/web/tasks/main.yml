# --- pkhack（ポケモンクイズ Next.js アプリ）: コミットSHAを比較してpullが必要か判断 ---
- name: "SHA確認 [{{ web_pkhack_repo_url | basename | replace('.git', '') }}] ローカル"
  ansible.builtin.command:
    cmd: git rev-parse HEAD
    chdir: "{{ app_dir }}/pkhack_tmp"
  register: web_pkhack_local_sha
  changed_when: false
  failed_when: false   # 初回はpkhack_tmpが存在しないためrc != 0になる
  become: true
  become_user: "{{ app_owner }}"

- name: "SHA確認 [{{ web_pkhack_repo_url | basename | replace('.git', '') }}] リモート ({{ web_pkhack_git_branch | default('main') }})"
  ansible.builtin.command:
    cmd: git ls-remote --heads {{ web_pkhack_repo_url }} {{ web_pkhack_git_branch | default('main') }}
  register: web_pkhack_remote_sha
  changed_when: false
  environment:
    GIT_SSH_COMMAND: "ssh -i /var/www/.ssh/id_ed25519_pkhack -o StrictHostKeyChecking=no"
  become: true
  become_user: "{{ app_owner }}"

- name: "更新判定 [{{ web_pkhack_repo_url | basename | replace('.git', '') }}]"
  ansible.builtin.set_fact:
    web_pkhack_code_updated: >-
      {{
        web_force_rebuild | default(false) | bool or
        (web_pkhack_local_sha.rc | default(1)) != 0 or
        (web_pkhack_remote_sha.stdout | default('') | trim) | length == 0 or
        (web_pkhack_remote_sha.stdout | default('') | trim).split('\t')[0] != (web_pkhack_local_sha.stdout | default('') | trim)
      }}

- name: "Git同期 [{{ web_pkhack_repo_url | basename | replace('.git', '') }}:{{ web_pkhack_git_branch | default('main') }}] → {{ app_dir }}/pkhack_tmp"
  ansible.builtin.git:
    repo: "{{ web_pkhack_repo_url }}"
    dest: "{{ app_dir }}/pkhack_tmp"
    update: true
    key_file: "/var/www/.ssh/id_ed25519_pkhack"
    accept_hostkey: true
    version: "{{ web_pkhack_git_branch | default('main') }}"
  become: true
  become_user: "{{ app_owner }}"
  when: web_pkhack_code_updated

