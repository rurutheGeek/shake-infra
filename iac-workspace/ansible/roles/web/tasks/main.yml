---
# web/tasks/main.yml
- name: Www-dataユーザーをdockerグループに追加
  ansible.builtin.user:
    name: "{{ app_owner }}"
    groups: docker
    append: true

- name: Dockerリポジトリ追加のための依存パッケージをインストール
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Dockerの公式GPGキー用ディレクトリの作成
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Dockerの公式GPGキーの取得
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Docker公式リポジトリの追加
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable
    state: present
    filename: docker

- name: Docker Compose Pluginのインストール
  ansible.builtin.apt:
    name: docker-compose-plugin
    state: present
    update_cache: true

- name: ベースディレクトリの作成
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: ログディレクトリの作成
  ansible.builtin.file:
    path: "{{ app_dir }}/log"
    state: directory
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: SSHディレクトリの作成 (www-data用)
  ansible.builtin.file:
    path: "/var/www/.ssh"
    state: directory
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0700"

- name: 既存のデプロイキーの存在確認
  ansible.builtin.stat:
    path: "/var/www/.ssh/id_ed25519_deploy"
  register: web_deploy_key_stat

- name: デプロイ用SSHキーペアの生成
  community.crypto.openssh_keypair:
    path: "/var/www/.ssh/id_ed25519_deploy"
    type: ed25519
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
  when: not web_deploy_key_stat.stat.exists

- name: 生成（または既存）の公開鍵の取得
  ansible.builtin.slurp:
    src: "/var/www/.ssh/id_ed25519_deploy.pub"
  register: web_deploy_pub_key

- name: GitHubへの接続確認（疎通確認）
  ansible.builtin.command: "ssh -T -o StrictHostKeyChecking=no -i /var/www/.ssh/id_ed25519_deploy git@github.com"
  register: web_github_ssh_check
  failed_when: false
  changed_when: false
  become: true
  become_user: "{{ app_owner }}"

- name: GitHubへのデプロイキー登録確認（未登録時のみ一時停止）
  ansible.builtin.pause:
    prompt: |
      ==================================================================
      GitHubへの接続に失敗しました。
      以下の公開鍵をGitHubの「Deploy keys」に登録してください。

      {{ web_deploy_pub_key['content'] | b64decode }}
      ==================================================================
  when: "'successfully authenticated' not in web_github_ssh_check.stderr"

- name: アプリケーションコードをGitから同期 # noqa: latest[git]
  ansible.builtin.git:
    repo: "{{ web_repo_url }}"
    dest: "{{ app_dir }}/src_tmp"
    update: true
    key_file: "/var/www/.ssh/id_ed25519_deploy"
    accept_hostkey: true
    version: HEAD
  become: true
  become_user: "{{ app_owner }}"
  register: web_git_sync_result

- name: AlexaスキルコードをGitから同期 # noqa: latest[git]
  ansible.builtin.git:
    repo: "{{ web_alexa_repo_url }}"
    dest: "{{ app_dir }}/alexa_tmp"
    update: true
    accept_hostkey: true
    version: HEAD
  become: true
  become_user: "{{ app_owner }}"
  register: web_alexa_git_sync_result

- name: ソースコードを本番ディレクトリへ配置（同期） # noqa: no-handler
  ansible.posix.synchronize:
    src: "{{ app_dir }}/src_tmp/{{ item }}"
    dest: "{{ app_dir }}/"
    rsync_opts:
      - "--exclude=.git"
  delegate_to: "{{ inventory_hostname }}"
  loop:
    - html
    - quiz
  when: web_git_sync_result.changed

- name: Alexaスキルコードを本番ディレクトリへ配置（同期） # noqa: no-handler
  ansible.posix.synchronize:
    src: "{{ app_dir }}/alexa_tmp/"
    dest: "{{ app_dir }}/alexa"
    rsync_opts:
      - "--exclude=.git"
  delegate_to: "{{ inventory_hostname }}"
  when: web_alexa_git_sync_result.changed

- name: インフラ設定ファイル群（Docker Compose等）の配置
  ansible.builtin.copy:
    src: files/web/
    dest: "{{ app_dir }}/"
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0640"
  register: web_files_copy

- name: Nginxテンプレート群の配置
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ app_dir }}/templates/"
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0640"
  loop:
    - files/web/conf.d/ssl.conf.template
    - files/web/conf.d/redirect.conf.template
  register: web_templates_copy

- name: Web用 .env の生成 (Jinja2テンプレート)
  ansible.builtin.template:
    src: templates/web/env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0600"
  register: web_env_template

- name: SSL秘密鍵の配置
  ansible.builtin.copy:
    src: secrets/web/key.pem
    dest: "{{ app_dir }}/certs/key.pem"
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0600"
  register: web_ssl_key_copy

- name: 証明書ファイルのパーミッション修正
  ansible.builtin.file:
    path: "{{ app_dir }}/certs/cert.pem"
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0600"

- name: コンテナの起動・更新
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    state: present
    build: always
    remove_orphans: true

- name: アプリケーションコード更新に伴うQuizコンテナの再構築と起動
  ansible.builtin.command:
    cmd: docker compose up -d --build quiz_app
    chdir: "{{ app_dir }}"
  changed_when: true

- name: アプリケーションコード更新に伴うAlexaスキルコンテナの再構築と起動
  ansible.builtin.command:
    cmd: docker compose up -d --build alexa_skill
    chdir: "{{ app_dir }}"
  changed_when: true

- name: 設定変更に伴うNginxコンテナの再起動
  ansible.builtin.command:
    cmd: docker compose restart web
    chdir: "{{ app_dir }}"
  when: web_files_copy.changed or web_templates_copy.changed or web_env_template.changed or web_ssl_key_copy.changed or web_alexa_git_sync_result.changed
  changed_when: true


