  when: web_ayahuya_code_updated

- name: ソースコードを本番ディレクトリへ配置（同期） # noqa: no-handler
  ansible.posix.synchronize:
    src: "{{ app_dir }}/src_tmp/{{ item }}"
    dest: "{{ app_dir }}/"
    delete: true   # 旧ファイルの残骸を除去（残るとnext buildのlintで失敗するため）
    rsync_opts:
      - "--exclude=.git"
  delegate_to: "{{ inventory_hostname }}"
  loop:
    - html
    - quiz
  when: web_code_updated

- name: Alexaスキルコードを本番ディレクトリへ配置（同期） # noqa: no-handler
  ansible.posix.synchronize:
    src: "{{ app_dir }}/alexa_tmp/"
    dest: "{{ app_dir }}/alexa"
    rsync_opts:
      - "--exclude=.git"
  delegate_to: "{{ inventory_hostname }}"
  when: web_alexa_code_updated

- name: pkhack コード（html/quiz）を本番ディレクトリへ配置（同期） # noqa: no-handler
  ansible.posix.synchronize:
    src: "{{ app_dir }}/pkhack_tmp/{{ item }}"   # html → nginx 静的配信、quiz → pkhack_app ビルド
    dest: "{{ app_dir }}/pkhack/"
    delete: true
    rsync_opts:
      - "--exclude=.git"
  delegate_to: "{{ inventory_hostname }}"
  loop:
    - html
    - quiz
  when: web_pkhack_code_updated

- name: ayahuya 静的コンテンツを本番ディレクトリへ配置（同期） # noqa: no-handler
  ansible.posix.synchronize:
    src: "{{ app_dir }}/ayahuya_tmp/html"   # ayahuya repo の html/ のみを配信（docs-src 等は不要）
    dest: "{{ app_dir }}/ayahuya/"          # → {{ app_dir }}/ayahuya/html（nginx がボリュームマウント）
    delete: true
    rsync_opts:
      - "--exclude=.git"
  delegate_to: "{{ inventory_hostname }}"
  when: web_ayahuya_code_updated

- name: インフラ設定ファイル群（Docker Compose等）の配置
  ansible.builtin.copy:
    src: files/web/
    dest: "{{ app_dir }}/"
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0640"
  register: web_files_copy

- name: Nginxテンプレート群の配置
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ app_dir }}/templates/"
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0640"
  loop:
    - files/web/conf.d/ssl.conf.template
    - files/web/conf.d/redirect.conf.template
    - files/web/conf.d/shake.conf.template
    - files/web/conf.d/pkhack.conf.template
    - files/web/conf.d/ayahuya.conf.template
  register: web_templates_copy

- name: Web用 .env の生成 (Jinja2テンプレート)
  ansible.builtin.template:
    src: templates/web/env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0600"
  register: web_env_template

- name: SSL秘密鍵の配置
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../local_config/ansible/credentials/key.pem"
    dest: "{{ app_dir }}/certs/key.pem"
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0600"
  register: web_ssl_key_copy

- name: 証明書ファイルのパーミッション修正
  ansible.builtin.file:
    path: "{{ app_dir }}/certs/cert.pem"
    owner: "{{ app_owner }}"
    group: "{{ app_group }}"
    mode: "0600"

- name: 停止済みの競合コンテナを削除（旧Compose v1形式の残骸対策）
  ansible.builtin.command:
    cmd: docker container prune -f
  changed_when: false

- name: コンテナの起動・更新
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    state: present
    build: policy   # イメージが存在しない場合のみビルド（毎回の全再ビルドを回避）
    remove_orphans: true

- name: アプリケーションコード更新に伴うQuizコンテナの再構築と起動
  ansible.builtin.command:
    cmd: docker compose up -d --build quiz_app
    chdir: "{{ app_dir }}"
  when: web_code_updated
  changed_when: true

- name: アプリケーションコード更新に伴うAlexaスキルコンテナの再構築と起動
  ansible.builtin.command:
    cmd: docker compose up -d --build alexa_skill
    chdir: "{{ app_dir }}"
  when: web_alexa_code_updated
  changed_when: true

- name: アプリケーションコード更新に伴う pkhack コンテナの再構築と起動
  ansible.builtin.command:
    cmd: docker compose up -d --build pkhack_app
    chdir: "{{ app_dir }}"
  when: web_pkhack_code_updated
  changed_when: true

- name: 設定変更に伴うNginxコンテナの再起動
  ansible.builtin.command:
    cmd: docker compose restart web
    chdir: "{{ app_dir }}"
  when: web_files_copy.changed or web_templates_copy.changed or web_env_template.changed or web_ssl_key_copy.changed or web_alexa_code_updated or web_pkhack_code_updated or web_ayahuya_code_updated
  changed_when: true

- name: SSL証明書期限チェックスクリプトの配置
  ansible.builtin.template:
    src: ssl-cert-check.sh.j2
    dest: /usr/local/bin/ssl-cert-check.sh
    mode: "0755"

- name: SSL証明書期限チェック用systemdサービスの配置
  ansible.builtin.template:
    src: ssl-cert-check.service.j2
    dest: /etc/systemd/system/ssl-cert-check.service
    mode: "0644"

- name: SSL証明書期限チェック用systemdタイマーの配置と有効化
  ansible.builtin.template:
    src: ssl-cert-check.timer.j2
    dest: /etc/systemd/system/ssl-cert-check.timer
    mode: "0644"
  notify: Enable ssl-cert-check timer


