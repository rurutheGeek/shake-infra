---
- name: Runner用の依存パッケージ（Ansible等）をインストール
  become: true
  apt:
    name:
      - ansible
      - curl
    state: present
    update_cache: yes

- name: Runner環境用の .ssh ディレクトリを作成
  become: false
  file:
    path: "~/.ssh"
    state: directory
    mode: '0700'

- name: Ansible用SSH秘密鍵をRunner環境へ配置
  become: false
  copy:
    src: "{{ ansible_ssh_private_key_file | default('~/.ssh/id_rsa') }}"
    dest: "~/.ssh/id_rsa"
    mode: '0600'

- name: Ansible VaultパスワードファイルをRunner環境へ配置
  become: false
  copy:
    src: "{{ playbook_dir }}/../.vault_pass"
    dest: "~/.vault_pass"
    mode: '0600'

- name: Runnerのディレクトリを作成
  become: false
  file:
    path: "{{ github_runner_dir }}"
    state: directory
    mode: '0755'

- name: Runnerバイナリのダウンロード
  become: false
  get_url:
    url: "https://github.com/actions/runner/releases/download/v{{ github_runner_version }}/actions-runner-linux-{{ github_runner_arch }}-{{ github_runner_version }}.tar.gz"
    dest: "{{ github_runner_dir }}/actions-runner-linux.tar.gz"
  register: runner_download

- name: Runnerバイナリの展開
  become: false
  unarchive:
    src: "{{ github_runner_dir }}/actions-runner-linux.tar.gz"
    dest: "{{ github_runner_dir }}"
    remote_src: yes
  when: runner_download.changed

- name: ランナーが設定済みか確認
  become: false
  stat:
    path: "{{ github_runner_dir }}/.credentials"
  register: runner_configured

- name: ランナーの設定
  become: false
  command: "./config.sh --url {{ github_repo_url }} --token {{ github_runner_token }} --unattended --replace"
  args:
    chdir: "{{ github_runner_dir }}"
  when: not runner_configured.stat.exists and github_runner_token is defined and github_repo_url is defined

- name: サービスのインストールスクリプト実行
  become: true
  command: "./svc.sh install"
  args:
    chdir: "{{ github_runner_dir }}"
  when: not runner_configured.stat.exists and github_runner_token is defined and github_repo_url is defined

- name: ランナーサービスの起動と有効化
  become: true
  command: "./svc.sh start"
  args:
    chdir: "{{ github_runner_dir }}"
  when: not runner_configured.stat.exists and github_runner_token is defined and github_repo_url is defined
