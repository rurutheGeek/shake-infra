---
# monitoring/tasks/main.yml


- name: "監視用ポート（Prometheus 9090, Grafana 3000, Loki 3100）の開放（Tailscaleのみ）"
  community.general.ufw:
    rule: allow
    src: 100.64.0.0/10
    port: "{{ item }}"
    proto: tcp
  loop:
    - "9090"
    - "3000"
    - "3100"

- name: "監視用ポート（Prometheus 9090, Grafana 3000, Loki 3100）の開放（緊急用ローカルLAN）"
  community.general.ufw:
    rule: allow
    src: 192.168.10.0/24
    port: "{{ item }}"
    proto: tcp
  loop:
    - "9090"
    - "3000"
    - "3100"

- name: 監視用ディレクトリの作成
  ansible.builtin.file:
    path: /opt/monitoring
    state: directory
    owner: ansible_admin
    mode: "0755"

- name: 設定ファイルの配置
  ansible.builtin.copy:
    src: "files/monitoring/{{ item }}"
    dest: /opt/monitoring/{{ item }}
    mode: "0644"
  loop:
    - prometheus.yml
    - prometheus_rules.yml
    - blackbox.yml
    - monitoring-compose.yml
    - failover_webhook.py
  notify: Restart monitoring containers

- name: Alertmanager設定の配置（Jinja2テンプレート / Discord Webhook を注入）
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: /opt/monitoring/alertmanager.yml
    mode: "0644"
  notify: Restart monitoring containers

- name: Promtail設定ファイルの配置（Jinja2テンプレート）
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: /opt/monitoring/promtail-config.yml
    mode: "0644"
  notify: Restart monitoring containers

- name: コンテナの起動 (Docker Compose V2)
  community.docker.docker_compose_v2:
    project_src: /opt/monitoring
    files:
      - monitoring-compose.yml
    state: present
    wait: true

- name: Failover Webhook用サービスファイルの配置
  ansible.builtin.template:
    src: failover-webhook.service.j2
    dest: /etc/systemd/system/failover-webhook.service
    mode: "0644"
  vars:
    ansible_user: "ruru" # tarakoserverのterraform実行権限を持つユーザー
    monitoring_data_dir: "/opt/monitoring"

- name: Failover Webhookのサービス起動と有効化
  ansible.builtin.systemd:
    name: failover-webhook.service
    state: restarted
    enabled: yes
    daemon_reload: yes
