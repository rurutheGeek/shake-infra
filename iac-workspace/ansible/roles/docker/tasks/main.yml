---
# docker/tasks/main.yml
- name: Dockerリポジトリ追加のための依存パッケージをインストール
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-debian
    state: present
    update_cache: true
    cache_valid_time: 3600  # common で更新済みなら再実行をスキップ

- name: Dockerの公式GPGキー用ディレクトリの作成
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Dockerの公式GPGキーの取得
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Docker公式リポジトリの追加
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: ["https://download.docker.com/linux/debian"]
    suites: ["{{ ansible_facts['distribution_release'] }}"]
    components: [stable]
    architectures: [arm64]
    signed_by: /etc/apt/keyrings/docker.asc
    state: present

- name: Docker関連パッケージのインストール
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
    cache_valid_time: 3600  # 上のタスクで更新済みなら再実行をスキップ

- name: Dockerサービスの起動と有効化
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
