---
# postgres/tasks/main.yml
- name: データベース用システムユーザー(postgres)の作成
  ansible.builtin.user:
    name: postgres
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    groups: docker
    append: true
  register: postgres_system_user

- name: PostgreSQL用ディレクトリの作成
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ postgres_system_user.uid }}"
    group: "{{ postgres_system_user.group }}"
    mode: "0750"
  loop:
    - "{{ pg_dir }}"
    - "{{ pg_dir }}/data"
    - "{{ pg_dir }}/init-db"

- name: PostgreSQL構成ファイル群の配置
  ansible.builtin.copy:
    src: postgres/
    dest: "{{ pg_dir }}/"
    owner: "{{ postgres_system_user.uid }}"
    group: "{{ postgres_system_user.group }}"
    mode: "0640"

- name: PostgreSQL用 .env の生成 (Jinja2テンプレート)
  ansible.builtin.template:
    src: postgres/env.j2
    dest: "{{ pg_dir }}/.env"
    owner: "{{ postgres_system_user.uid }}"
    group: "{{ postgres_system_user.group }}"
    mode: "0600"

- name: PostgreSQL コンテナの起動
  community.docker.docker_compose_v2:
    project_src: "{{ pg_dir }}"
    state: present
    build: always
    remove_orphans: true

# --- init後のパスワードドリフト是正 ---
# init-db スクリプト(01_setup_users.sh)はボリューム初回作成時にしかパスワードを
# 設定しないため、Vault側の値を後から変更すると既存DBと乖離する（潜在的な認証障害）。
# 毎回 Vault値へ ALTER USER して収束させ、init-once 起因の事故を構造的に防ぐ。
- name: PostgreSQLが接続受付可能になるまで待機
  ansible.builtin.command:
    cmd: docker exec shake_postgres pg_isready -U {{ postgres_user }} -d {{ db_name }}
  register: pg_ready
  until: pg_ready.rc == 0
  retries: 15
  delay: 4
  changed_when: false

- name: アプリDBユーザーのパスワードを Vault 値へ同期（冪等収束）
  ansible.builtin.command:
    cmd: docker exec -i shake_postgres psql -U {{ postgres_user }} -d {{ db_name }} -v ON_ERROR_STOP=1
    stdin: |
      ALTER USER "{{ db_user_reader }}" WITH PASSWORD '{{ db_password_reader | replace("'", "''") }}';
      ALTER USER "{{ db_user_editor }}" WITH PASSWORD '{{ db_password_editor | replace("'", "''") }}';
  changed_when: false
  no_log: true

# --- shakeweb DB の冪等セットアップ ---
# init-db/02_setup_shakeweb.sh はボリューム初回作成時にしか動かないため、
# 既存の稼働中ボリュームには以下の Ansible タスクで冪等に適用する。
- name: shakeweb DB の作成（存在しない場合のみ）
  ansible.builtin.command:
    cmd: docker exec -i shake_postgres psql -U {{ postgres_user }} -v ON_ERROR_STOP=1
    stdin: |
      SELECT 'CREATE DATABASE {{ shakeweb_db_name }}'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '{{ shakeweb_db_name }}')\gexec
  changed_when: false

- name: shakeweb ユーザーの作成と権限付与（存在しない場合のみ）
  ansible.builtin.command:
    cmd: docker exec -i shake_postgres psql -U {{ postgres_user }} -d {{ shakeweb_db_name }} -v ON_ERROR_STOP=1
    stdin: |
      DO $$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ shakeweb_db_user_reader }}') THEN
          CREATE USER "{{ shakeweb_db_user_reader }}" WITH PASSWORD '{{ shakeweb_db_password_reader | replace("'", "''") }}';
        END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ shakeweb_db_user_editor }}') THEN
          CREATE USER "{{ shakeweb_db_user_editor }}" WITH PASSWORD '{{ shakeweb_db_password_editor | replace("'", "''") }}';
        END IF;
      END
      $$;
      GRANT CONNECT ON DATABASE {{ shakeweb_db_name }} TO "{{ shakeweb_db_user_reader }}";
      GRANT CONNECT ON DATABASE {{ shakeweb_db_name }} TO "{{ shakeweb_db_user_editor }}";
      GRANT USAGE ON SCHEMA public TO "{{ shakeweb_db_user_reader }}";
      GRANT USAGE, CREATE ON SCHEMA public TO "{{ shakeweb_db_user_editor }}";
      GRANT SELECT ON ALL TABLES IN SCHEMA public TO "{{ shakeweb_db_user_reader }}";
      GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO "{{ shakeweb_db_user_editor }}";
      GRANT SELECT ON ALL SEQUENCES IN SCHEMA public TO "{{ shakeweb_db_user_reader }}";
      GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO "{{ shakeweb_db_user_editor }}";
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO "{{ shakeweb_db_user_reader }}";
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON SEQUENCES TO "{{ shakeweb_db_user_reader }}";
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO "{{ shakeweb_db_user_editor }}";
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO "{{ shakeweb_db_user_editor }}";
  changed_when: false
  no_log: true

- name: shakeweb ユーザーのパスワードを Vault 値へ同期（冪等収束）
  ansible.builtin.command:
    cmd: docker exec -i shake_postgres psql -U {{ postgres_user }} -d {{ shakeweb_db_name }} -v ON_ERROR_STOP=1
    stdin: |
      ALTER USER "{{ shakeweb_db_user_reader }}" WITH PASSWORD '{{ shakeweb_db_password_reader | replace("'", "''") }}';
      ALTER USER "{{ shakeweb_db_user_editor }}" WITH PASSWORD '{{ shakeweb_db_password_editor | replace("'", "''") }}';
  changed_when: false
  no_log: true
