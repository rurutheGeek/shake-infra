groups:
  - name: failover.rules
    rules:
      - alert: ProxyDown
        expr: probe_success{job="blackbox"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Reverse Proxy is down"
          description: "Blackbox exporter cannot reach the reverse proxy."

  - name: node.rules
    rules:
      - alert: NodeDown
        expr: up{job="node_exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} is down"
          description: "node_exporter on {{ $labels.instance }} has been unreachable for more than 1 minute."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 90% on {{ $labels.instance }}."

      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage on {{ $labels.instance }}"
          description: "Disk usage on / is above 85% on {{ $labels.instance }}."

  - name: web.rules
    rules:
      - alert: WebDbEndpointDown
        expr: probe_success{job="blackbox_https", instance=~".*/quiz/api/bsquiz/pokedex"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "shake-web のDB連携エンドポイントが不通"
          description: "{{ $labels.instance }} が2分以上 2xx を返していません。DB認証ズレ・コンテナ停止等を疑ってください。"

      - alert: WebSiteDown
        expr: probe_success{job="blackbox_https", instance="https://ruruthegeek.dpdns.org/"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "shake-web トップページが不通"
          description: "公開URLが2分以上 2xx を返していません。"