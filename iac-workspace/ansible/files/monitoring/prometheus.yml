global:
  scrape_interval: 15s

rule_files:
  - 'prometheus_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets:
          - '100.92.253.28:9100'
          - '100.116.167.59:9100'
          - 'localhost:9100'

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_proxy_reachable]   # 80→301 を成功とみなす（:443へは追従しない）
    static_configs:
      - targets:
          - http://100.116.167.59:80
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: 'localhost:9115'

  # 実ユーザー経路(HTTPS)でアプリ/DB連携エンドポイントを監視する専用ジョブ。
  # job名を 'blackbox' と分けることで、ここでの失敗が ProxyDown(=フェイルオーバー) を
  # 誤発火させないようにしている。
  - job_name: 'blackbox_https'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://ruruthegeek.dpdns.org/quiz/api/bsquiz/pokedex
          - https://ruruthegeek.dpdns.org/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'localhost:9115'

  - job_name: 'ups_exporter'
    static_configs:
      - targets:
          - '100.116.167.59:9101'

  - job_name: 'cadvisor'
    static_configs:
      - targets:
          - '100.116.167.59:8090'
          - 'localhost:8090'
