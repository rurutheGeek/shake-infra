services:
  web:
    image: nginx:latest
    container_name: shake_web
    ports:
      - "443:443"
      - "80:80"
      - "8443:8443"
    volumes:
      - ./html:/usr/share/nginx/html
      - ./log:/var/log/nginx
      - ./certs:/etc/nginx/certs:ro
      - ./templates:/etc/nginx/templates:ro
    restart: always
    depends_on:
      - quiz_app

  quiz_app:
    build: ./quiz
    container_name: bsquiz
    ports:
      - "3000:3000"
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_USER=${DB_USER}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
