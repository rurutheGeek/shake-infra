---
# test_restore.yml
# PostgreSQL バックアップのリストアテストを実行する playbook
# 月次で手動実行し、バックアップの実効性を確認する
#
# 使用方法:
#   ansible-playbook -i local_config/ansible/inventory.ini \
#     -e @local_config/ansible/vars.yml \
#     -e @local_config/ansible/credentials/vault.yml \
#     ansible/playbooks/test_restore.yml
#
# 前提条件:
#   - R2 バケット (shakeserver-backup) に PostgreSQL バックアップが存在すること
#   - home_node1 に docker, aws CLI (rclone 経由) が利用可能なこと

- name: PostgreSQL バックアップ リストアテスト
  hosts: home_node1
  become: true
  vars:
    restore_test_dir: /tmp/restore_test
    restore_container_name: restore_test_postgres
    restore_db_name: restore_test_db
    postgres_image: postgres:15-alpine

  tasks:
    - name: PostgreSQL リストアテストの実行と後処理
      block:
        - name: リストアテスト用ディレクトリの作成
          ansible.builtin.file:
            path: "{{ restore_test_dir }}"
            state: directory
            mode: "0700"

        - name: 最新の PostgreSQL バックアップファイルを R2 から取得
          ansible.builtin.command:
            cmd: >
              docker run --rm
              -e AWS_ACCESS_KEY_ID="{{ r2_access_key_id }}"
              -e AWS_SECRET_ACCESS_KEY="{{ r2_secret_access_key }}"
              amazon/aws-cli s3 ls
              s3://shakeserver-backup/postgres/
              --endpoint-url "{{ r2_endpoint }}"
              --no-sign-request
            chdir: "{{ restore_test_dir }}"
          register: r2_listing
          changed_when: false

        - name: 最新のバックアップファイル名を特定
          ansible.builtin.set_fact:
            latest_backup: "{{ r2_listing.stdout_lines | select('search', '\\.sql') | list | last | split() | last }}"

        - name: バックアップファイルを R2 からダウンロード
          ansible.builtin.command:
            cmd: >
              docker run --rm
              -e AWS_ACCESS_KEY_ID="{{ r2_access_key_id }}"
              -e AWS_SECRET_ACCESS_KEY="{{ r2_secret_access_key }}"
              -v "{{ restore_test_dir }}:/data"
              amazon/aws-cli s3 cp
              s3://shakeserver-backup/postgres/{{ latest_backup }}
              /data/{{ latest_backup }}
              --endpoint-url "{{ r2_endpoint }}"
              --no-sign-request
          changed_when: true

        - name: リストアテスト用 PostgreSQL コンテナの起動
          community.docker.docker_container:
            name: "{{ restore_container_name }}"
            image: "{{ postgres_image }}"
            state: started
            env:
              POSTGRES_PASSWORD: "restore_test_pass" # pragma: allowlist secret
              POSTGRES_DB: "{{ restore_db_name }}"
            restart_policy: "no"

        - name: コンテナ起動待機
          ansible.builtin.wait_for:
            timeout: 15

        - name: バックアップをテストコンテナにリストア
          ansible.builtin.command:
            cmd: >
              docker exec -i {{ restore_container_name }}
              psql -U postgres -d {{ restore_db_name }}
            stdin: "{{ lookup('file', restore_test_dir + '/' + latest_backup) }}"
          register: restore_result
          changed_when: true
          failed_when: restore_result.rc != 0

        - name: リストア結果の確認（テーブル一覧取得）
          ansible.builtin.command:
            cmd: >
              docker exec {{ restore_container_name }}
              psql -U postgres -d {{ restore_db_name }} -c "\dt"
          register: table_check
          changed_when: false

        - name: テーブル一覧の出力
          ansible.builtin.debug:
            msg: "{{ table_check.stdout }}"

        - name: Discord にリストアテスト成功を通知
          ansible.builtin.uri:
            url: "{{ ubsleepy_backup_discord_webhook }}"
            method: POST
            body_format: json
            body:
              content: "[RESTORE TEST OK] PostgreSQL バックアップのリストアテストが成功しました。\nバックアップファイル: {{ latest_backup }}"
          when: restore_result.rc == 0

      always:
        - name: テストコンテナの停止・削除
          community.docker.docker_container:
            name: "{{ restore_container_name }}"
            state: absent
            force_kill: true

        - name: ダウンロードしたバックアップファイルの削除
          ansible.builtin.file:
            path: "{{ restore_test_dir }}"
            state: absent
