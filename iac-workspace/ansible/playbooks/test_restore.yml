---
# test_restore.yml
# PostgreSQL バックアップのリストアテストを実行する playbook
# 月次で手動実行し、バックアップの実効性を確認する
#
# 使用方法:
#   ansible-playbook -i local_config/ansible/inventory.ini \
#     -e @local_config/ansible/vars.yml \
#     -e @local_config/ansible/credentials/vault.yml \
#     ansible/playbooks/test_restore.yml
#
# 前提条件:
#   - R2 バケット (shakeserver-backup) の db-backups/ プレフィックスに
#     eeshugerman/postgres-backup-s3 がアップロードした .dump.gz が存在すること
#   - home_node1 に docker が利用可能なこと
#
# バックアップ形式の前提:
#   - postgres ロールの db-backup コンテナは S3_PREFIX="db-backups"、
#     pg_dump のカスタム形式 (.dump) を gzip 圧縮してアップロードしている。
#   - したがって本テストは pg_restore --format=custom を用いて復元する。

- name: PostgreSQL バックアップ リストアテスト
  hosts: home_node1
  become: true
  vars:
    restore_test_dir: /tmp/restore_test
    restore_container_name: restore_test_postgres
    restore_db_name: restore_test_db
    postgres_image: postgres:15-alpine
    backup_prefix: "db-backups"

  tasks:
    - name: PostgreSQL リストアテストの実行と後処理
      block:
        - name: リストアテスト用ディレクトリの作成
          ansible.builtin.file:
            path: "{{ restore_test_dir }}"
            state: directory
            mode: "0700"

        - name: 最新の PostgreSQL バックアップファイルを R2 から取得
          ansible.builtin.command:
            cmd: >
              docker run --rm
              -e AWS_ACCESS_KEY_ID={{ r2_access_key_id }}
              -e AWS_SECRET_ACCESS_KEY={{ r2_secret_access_key }}
              amazon/aws-cli s3 ls
              s3://shakeserver-backup/{{ backup_prefix }}/
              --endpoint-url {{ r2_endpoint }}
            chdir: "{{ restore_test_dir }}"
          register: r2_listing
          changed_when: false

        - name: 最新のバックアップファイル名を特定 (.dump or .dump.gz)
          ansible.builtin.set_fact:
            latest_backup: "{{ r2_listing.stdout_lines | select('search', '\\.dump(\\.gz)?$') | list | last | split() | last }}"

        - name: バックアップファイルを R2 からダウンロード
          ansible.builtin.command:
            cmd: >
              docker run --rm
              -e AWS_ACCESS_KEY_ID={{ r2_access_key_id }}
              -e AWS_SECRET_ACCESS_KEY={{ r2_secret_access_key }}
              -v {{ restore_test_dir }}:/data
              amazon/aws-cli s3 cp
              s3://shakeserver-backup/{{ backup_prefix }}/{{ latest_backup }}
              /data/{{ latest_backup }}
              --endpoint-url {{ r2_endpoint }}
          changed_when: true

        - name: gzip 圧縮バックアップを展開
          ansible.builtin.command:
            cmd: gunzip {{ restore_test_dir }}/{{ latest_backup }}
          when: latest_backup.endswith('.gz')
          changed_when: true

        - name: 展開後のファイル名を確定
          ansible.builtin.set_fact:
            backup_file: "{{ latest_backup | regex_replace('\\.gz$', '') }}"

        - name: リストアテスト用 PostgreSQL コンテナの起動
          community.docker.docker_container:
            name: "{{ restore_container_name }}"
            image: "{{ postgres_image }}"
            state: started
            env:
              POSTGRES_PASSWORD: "restore_test_pass" # pragma: allowlist secret
              POSTGRES_DB: "{{ restore_db_name }}"
            volumes:
              - "{{ restore_test_dir }}:/restore:ro"
            restart_policy: "no"

        - name: コンテナの healthcheck 待機
          ansible.builtin.command:
            cmd: docker exec {{ restore_container_name }} pg_isready -U postgres
          register: pg_ready
          retries: 15
          delay: 2
          until: pg_ready.rc == 0
          changed_when: false

        - name: バックアップをテストコンテナにリストア (pg_restore カスタム形式)
          ansible.builtin.command:
            cmd: >
              docker exec {{ restore_container_name }}
              pg_restore -U postgres -d {{ restore_db_name }} --no-owner --no-privileges
              /restore/{{ backup_file }}
          register: restore_result
          changed_when: true
          failed_when: restore_result.rc != 0

        - name: リストア結果の確認（テーブル一覧取得）
          ansible.builtin.command:
            cmd: >
              docker exec {{ restore_container_name }}
              psql -U postgres -d {{ restore_db_name }} -c "\dt"
          register: table_check
          changed_when: false

        - name: テーブル一覧の出力
          ansible.builtin.debug:
            msg: "{{ table_check.stdout }}"

        - name: Discord にリストアテスト成功を通知
          ansible.builtin.uri:
            url: "{{ ubsleepy_backup_discord_webhook }}"
            method: POST
            body_format: json
            body:
              content: "[RESTORE TEST OK] PostgreSQL バックアップのリストアテストが成功しました。\nバックアップファイル: {{ latest_backup }}"
          when: restore_result.rc == 0

      always:
        - name: テストコンテナの停止・削除
          community.docker.docker_container:
            name: "{{ restore_container_name }}"
            state: absent
            force_kill: true

        - name: ダウンロードしたバックアップファイルの削除
          ansible.builtin.file:
            path: "{{ restore_test_dir }}"
            state: absent
